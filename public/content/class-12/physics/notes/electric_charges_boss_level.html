      hint: "The two charges create fields in OPPOSITE directions at origin (both point away from the charges, so they cancel at center). For part (c), since E_net = 0, you must compute the gradient carefully — fields don't cancel in their derivatives! This is the trap.",
      formulaFusion: ["E from point charge = kQ/r²", "Net E = E₁ + E₂ (vector sum)", "τ = pE sinθ", "F = p·(dE/dx)", "U = −pE cosθ for stability"],
      given: ["p = 8×10⁻⁸ C·m", "Q₁ = Q₂ = +10×10⁻⁶ C", "r = 0.2 m from each", "k = 9×10⁹"],
      steps: [
        { l: "(a) Fields at origin from Q₁ and Q₂", v: "Q₁ at x=−0.2 m: field at origin points in +x̂ (away from Q₁)\nE₁ = kQ/r² = 9×10⁹×10⁻⁵/0.04 = 2.25×10⁶ N/C in +x̂\n\nQ₂ at x=+0.2 m: field at origin points in −x̂ (away from Q₂)\nE₂ = 2.25×10⁶ N/C in −x̂\n\nNet E = E₁ + E₂ = 0 N/C (fields cancel by symmetry)", mono: false },
        { l: "(b) Torque at θ = 45°", v: "τ = pE_net sinθ = p × 0 × sin45° = 0 N·m\nWith zero net field, torque = 0 regardless of angle.", mono: false },
        { l: "(c) Force using gradient — the TRAP", v: "E(x) from Q₁ and Q₂ combined:\nE(x) = kQ/(x+0.2)² − kQ/(0.2−x)² [for small x near origin, Q₁ pushes +x, Q₂ pushes −x]\n\nAt x=0: E=0 as shown. But dE/dx ≠ 0!", mono: false },
        { l: "Compute dE/dx at x=0", v: "dE/dx = d/dx [kQ(x+0.2)⁻² − kQ(0.2−x)⁻²]\n= kQ[−2(x+0.2)⁻³ − 2(0.2−x)⁻³]\nAt x=0: = kQ[−2/(0.2)³ − 2/(0.2)³] = −4kQ/(0.2)³\n= −4×9×10⁹×10⁻⁵/0.008 = −4.5×10⁷ N/C·m", mono: false },
        { l: "Force on dipole", v: "F = p·cosθ·(dE/dx)  [at θ=45°, cosθ = 1/√2]\n= 8×10⁻⁸ × (1/√2) × (−4.5×10⁷)\n= 8×10⁻⁸ × 0.707 × 4.5×10⁷ = 2.546 N (in −x̂ = restoring toward center) ✓", mono: false },
        { l: "(d) Stability at θ = 0°", v: "At θ=0°: U = −pE cosθ. But E=0 at origin, so U = 0 for any θ.\nHowever, a small displacement in x creates a gradient force that RESTORES the dipole (as computed above — force is toward center).\nConclusion: NEUTRAL rotational equilibrium (no torque since E=0), but STABLE translational equilibrium (gradient force is restoring).", mono: false }
      ],
      answer: "(a) E_net = 0 | (b) τ = 0 | (c) F = 2.55 N restoring | (d) Neutral rotationally, Stable translationally"
    },
    {
      id: 7, topic: "multi", xp: 230,
      tag: "FIELD SUPERPOSITION + DIPOLE GEOMETRY",
      tagClass: "tag-multi",
      title: "The Crossed Dipoles",
      text: "Two identical dipoles each with p = 3×10⁻⁸ C·m are placed at origin. Dipole 1 points along +x̂, Dipole 2 points along +ŷ. Find the magnitude and direction of the combined electric field at point P = (0, 0, 5 cm) — a point on the z-axis (which is equatorial to BOTH dipoles). Then find the angle the net field makes with the x-axis.",
      hint: "P is on the equatorial plane of dipole 1 (equatorial in xz plane) AND equatorial plane of dipole 2 (equatorial in yz plane). Both dipoles contribute equatorial fields at P, but in opposite directions to their respective dipole moments.",
      formulaFusion: ["E_equatorial = kp/r³ anti-parallel to p̂", "Vector addition of two perpendicular fields", "tan α = Ey/Ex for direction"],
      given: ["p₁ = p₂ = 3×10⁻⁸ C·m", "r = 5 cm = 0.05 m", "P on z-axis", "k = 9×10⁹"],
      steps: [
        { l: "Field from Dipole 1 (along x̂) at P on z-axis", v: "P is on equatorial plane of D1 (z-axis is equatorial to x̂ dipole).\nE₁ = kp/r³ = 9×10⁹×3×10⁻⁸/(0.05)³ = 270/1.25×10⁻⁴ = 2.16×10⁶ N/C\nDirection: anti-parallel to p̂₁ = −x̂\nE₁ = −2.16×10⁶ x̂ N/C", mono: false },
        { l: "Field from Dipole 2 (along ŷ) at P on z-axis", v: "P is also equatorial to D2.\nE₂ = kp/r³ = 2.16×10⁶ N/C (same magnitude)\nDirection: anti-parallel to p̂₂ = −ŷ\nE₂ = −2.16×10⁶ ŷ N/C", mono: false },

        { l: "Direction angle", v: "Both components equal in magnitude along −x̂ and −ŷ.\nAngle = 45° below −x̂ toward −ŷ, i.e., 225° from +x̂ (or equivalently SW direction in xy-plane)", mono: false },
        { l: "Physical meaning", v: "The combined field at P is √2 times larger than either single dipole's contribution, pointing diagonally opposite to the vector sum of both dipole moments (p₁ + p₂).", mono: false }
      ],
      answer: "|E_net| = 3.055×10⁶ N/C at 225° from +x̂ (anti-parallel to p₁+p₂ diagonal)"

    {
      id: 8, topic: "dipole", xp: 190,
      tag: "WORK-ENERGY + POTENTIAL + DIPOLE ANGLE",
      tagClass: "tag-dipole",
      title: "The Forbidden Rotation",
      text: "A dipole (p = 6×10⁻⁸ C·m) is in a uniform field E = 4×10⁵ N/C. It starts at θ = 0° (stable equilibrium) and is given a kinetic energy of 8×10⁻³ J. (a) Find the maximum angle θ_max it can reach before stopping, using energy conservation: KE_initial = ΔPE = pE(cosθ_initial − cosθ_max). (b) Will it complete a full revolution (360°)? Find the minimum initial KE required for full rotation.",
      hint: "At max angle: all KE converts to PE. Set ½mv² = pE(1 − cosθ_max). For full revolution, it must cross θ=180° (the unstable point with maximum PE = 2pE). Min KE for full rotation = 2pE.",
      formulaFusion: ["U = −pE cosθ", "ΔPE = pE(cosθᵢ − cosθ_f)", "KE_initial = ΔPE at turning point", "Min KE for full rotation = 2pE"],
      given: ["p = 6×10⁻⁸ C·m", "E = 4×10⁵ N/C", "KE_initial = 8×10⁻³ J"],
      steps: [
        { l: "PE change formula", v: "Starting at θ=0°: U_i = −pE cos0° = −pE\nAt angle θ: U_f = −pE cosθ\nΔU = pE(1 − cosθ)", mono: false },
        { l: "(a) Energy conservation at θ_max", v: "KE_initial = ΔU\n8×10⁻³ = pE(1 − cosθ_max)\n8×10⁻³ = 6×10⁻⁸ × 4×10⁵ × (1 − cosθ_max)\n8×10⁻³ = 24×10⁻³ × (1 − cosθ_max)", mono: false },
        { l: "Solve for θ_max", v: "1 − cosθ_max = 8×10⁻³ / 24×10⁻³ = 1/3\ncosθ_max = 2/3\nθ_max = cos⁻¹(2/3) ≈ 48.19°", mono: false },
        { l: "(b) Check for full revolution", v: "For full rotation, dipole must cross θ = 180°.\nΔU needed = pE(1 − cos180°) = pE × 2 = 2pE\n= 2 × 6×10⁻⁸ × 4×10⁵ = 48×10⁻³ J", mono: false },
        { l: "Minimum KE for full rotation", v: "KE_min = 2pE = 48×10⁻³ J = 48 mJ\nSince 8 mJ < 48 mJ: NO full revolution. Dipole oscillates between −48.2° and +48.2°.", mono: false }
      ],
      answer: "(a) θ_max ≈ 48.2° | (b) No full revolution; Min KE needed = 48 mJ > 8 mJ given"
    },
    {
      id: 9, topic: "coulomb", xp: 210,
      tag: "COULOMB + SHELL THEOREM + CUSTOM FORMULA",
      tagClass: "tag-coulomb",
      title: "The Buried Charge Problem",
      text: "A solid non-conducting sphere of radius R = 10 cm has total charge Q = 12 μC uniformly distributed throughout its volume. A point charge q = 2 μC is placed at distance r = 6 cm from the center (inside the sphere). Using Gauss's Law to find enclosed charge, fuse with Coulomb's law to find the force on q. Then find the force at r = 15 cm (outside). Compare both — build your own formula for F(r) inside and outside.",
      hint: "Inside: Q_enc = Q × (r³/R³). Force: F = k·Q_enc·q/r² = k·q·Q·r/R³. This is a LINEAR function of r (not inverse square!) inside. Outside: normal Coulomb. Build the piecewise formula yourself.",
      formulaFusion: ["Gauss: Q_enc = Q·(r/R)³ (inside)", "F_inside = kqQ·r/R³", "F_outside = kqQ/r²", "Piecewise force function F(r)"],
      given: ["Q = 12×10⁻⁶ C", "q = 2×10⁻⁶ C", "R = 0.1 m", "r_in = 0.06 m", "r_out = 0.15 m", "k = 9×10⁹"],
      steps: [
        { l: "Enclosed charge at r = 6 cm (inside)", v: "Q_enc = Q × (r/R)³ = 12×10⁻⁶ × (0.06/0.1)³ = 12×10⁻⁶ × 0.216 = 2.592×10⁻⁶ C", mono: false },
        { l: "Force on q inside (r = 6 cm)", v: "F = kQ_enc·q/r² = 9×10⁹ × 2.592×10⁻⁶ × 2×10⁻⁶ / (0.06)²\n= 9×10⁹ × 5.184×10⁻¹² / 3.6×10⁻³ = 12.95 N", mono: false },
        { l: "Custom formula (inside)", v: "F_inside = k·q·Q·r/R³ [force is linear in r — grows with r!]", mono: true },
        { l: "Force outside (r = 15 cm)", v: "F_outside = kQq/r² = 9×10⁹ × 12×10⁻⁶ × 2×10⁻⁶ / (0.15)²\n= 9×10⁹ × 24×10⁻¹² / 0.0225 = 9.6 N", mono: false },
        { l: "Piecewise force function (your custom formula)", v: "F(r) = { kqQr/R³       if r ≤ R (linear, increases inward)\n        { kqQ/r²        if r > R (inverse square)", mono: true },
        { l: "Comparison insight", v: "Inside: F_in(0.06) = 12.95 N > F_out(0.15) = 9.6 N\nAt surface (r=R=0.1m): both give F = kqQ/R² = 21.6 N — formulas match at boundary ✓", mono: false }
      ],
      answer: "F_inside = 12.95 N (linear) | F_outside = 9.6 N (inverse sq.) | Custom F(r) piecewise formula derived"
    },
    {
      id: 10, topic: "axial", xp: 240,
      tag: "FULL INTEGRATION: ALL FIVE CONCEPTS",
      tagClass: "tag-axial",
      title: "The Final Boss — Complete System Analysis",
      text: "A dipole A (pA = 10×10⁻⁸ C·m) is fixed at origin along x-axis. A second dipole B (pB = 4×10⁻⁸ C·m, mass m = 2 g) is placed at x = 8 cm, also along x-axis, and released from rest. (a) Find E_axial of A at x = 8 cm. (b) Find initial torque on B (θ = 0° initially, both aligned). (c) Find initial force on B using F = pB·(dE/dx). (d) Find KE of B when it reaches x = 4 cm using W = ∫F dx or W = pB·[E(4cm) − E(8cm)]. (e) At what distance does the force on B equal 5 N?",
      hint: "This chains: axial field formula → gradient → force → work → velocity. Part (e) requires inverting the force equation. All five sub-concepts from Phase 2 fire in sequence.",
      formulaFusion: ["E_axial = 2kpA/r³", "F = pB·|dE/dx| = 6kpApB/r⁴", "W = pB·ΔE = pB[E(r_f)−E(r_i)]", "KE = W", "r⁴ = 6kpApB/F for part (e)"],
      given: ["pA = 10⁻⁷ C·m", "pB = 4×10⁻⁸ C·m", "m = 2×10⁻³ kg", "k = 9×10⁹", "r_i=0.08 m", "r_f=0.04 m"],
      steps: [
        { l: "(a) E_axial at r = 8 cm", v: "E = 2kpA/r³ = 2×9×10⁹×10⁻⁷/(0.08)³\n= 1800 / 5.12×10⁻⁴ = 3.516×10⁶ N/C", mono: false },
        { l: "(b) Torque on B (θ=0°)", v: "τ = pBE sinθ = pB × E × 0 = 0 N·m\nB is aligned with A, stable equilibrium — no torque. It only translates.", mono: false },
        { l: "(c) Force on B at r = 8 cm", v: "dE/dx = −6kpA/r⁴\n|F| = pB × 6kpA/r⁴ = 6 × 9×10⁹ × 10⁻⁷ × 4×10⁻⁸ / (0.08)⁴\n= 6×9×10⁹×4×10⁻¹⁵ / 4.096×10⁻⁵\n= 2.16×10⁻⁴ / 4.096×10⁻⁵ = 5.27 N", mono: false },
        { l: "(d) Work done moving from 8 cm to 4 cm", v: "E at r=0.04m = 2×9×10⁹×10⁻⁷/(0.04)³ = 1800/6.4×10⁻⁵ = 2.8125×10⁷ N/C\nW = pB × [E(4cm) − E(8cm)] = 4×10⁻⁸ × [2.8125×10⁷ − 3.516×10⁶]\n= 4×10⁻⁸ × 2.461×10⁷ = 0.9844 J", mono: false },
        { l: "Velocity at r = 4 cm", v: "KE = W ⇒ ½mv² = 0.9844\nv² = 2×0.9844/2×10⁻³ = 984.4\nv = 31.37 m/s", mono: false },
        { l: "(e) Distance where F = 5 N", v: "F = 6kpApB/r⁴ = 5\nr⁴ = 6kpApB/5 = 6×9×10⁹×10⁻⁷×4×10⁻⁸/5\n= 6×9×4×10⁻⁶/5 = 4.32×10⁻⁵\nr = (4.32×10⁻⁵)^(1/4) = (4.32)^0.25 × 10⁻¹·²⁵\n= 1.441 × 0.0562 = 0.08097 m ≈ 8.1 cm ✓ (matches part c, where F ≈ 5.27 N at 8 cm)", mono: false }
      ],
      answer: "(a) 3.52×10⁶ N/C | (b) τ=0 | (c) F≈5.27 N | (d) v≈31.4 m/s | (e) r≈8.1 cm"
    }
  ];

  let totalSolved = 0;
  let totalXP = 0;
  const xpMap = {};

  function renderCards(filter) {
    const list = document.getElementById("qlist");
    const filtered = filter === "all" ? questions : questions.filter(q => q.topic === filter);
    list.innerHTML = filtered.map(q => `
      <div class="bg-boss-card border border-boss-border rounded-2xl p-5 mb-4 card-glow transition-all" id="card-${q.id}">
        <!-- Top row -->
        <div class="flex items-start justify-between gap-3 mb-3 flex-wrap">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="q-number text-xs font-bold text-boss-accent bg-boss-accent/10 border border-boss-accent/20 px-2 py-0.5 rounded-md">Q${q.id}</span>
            <span class="concept-pill ${q.tagClass} px-2 py-0.5 rounded-md">${q.tag}</span>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="diff-badge text-boss-orange border border-boss-orange/30 bg-boss-orange/10 px-2 py-0.5 rounded-md">+${q.xp} XP</span>
          </div>
        </div>

        <!-- Title -->
        <h3 class="text-base font-semibold text-white mb-2 leading-snug">${q.title}</h3>

        <!-- Question text -->
        <p class="text-sm text-boss-text leading-7 mb-3">${q.text}</p>

        <!-- Given -->
        <div class="bg-[#0f0f18] border border-boss-border rounded-xl px-3 py-2.5 mb-3">
          <span class="text-xs font-mono text-boss-dim uppercase tracking-wider">Given → </span>
          <span class="text-xs text-boss-text font-mono">${q.given.join("  ·  ")}</span>
        </div>

        <!-- Formula fusion tags -->
        <div class="flex flex-wrap gap-1.5 mb-4">
          <span class="text-xs text-boss-dim font-mono">Fuse:</span>
          ${q.formulaFusion.map(f => `<span class="formula-inline text-xs text-boss-cyan px-2 py-0.5 rounded-md">${f}</span>`).join("")}
        </div>

        <!-- Hint -->
        <div class="hint-block bg-[#111108] pl-3 pr-3 py-2 rounded-r-xl rounded-l-none mb-4">
          <span class="text-xs text-boss-accent font-mono uppercase tracking-wider">⚡ Strategy Hint: </span>
          <span class="text-xs text-boss-text/70">${q.hint}</span>
        </div>

        <!-- Toggle button -->
        <button
          id="btn-${q.id}"
          onclick="toggleSolution(${q.id}, ${q.xp})"
          class="flex items-center gap-2 text-xs font-mono border border-boss-muted text-boss-dim hover:border-boss-accent hover:text-boss-accent px-4 py-2 rounded-xl transition-all"
        >
          <span id="btn-icon-${q.id}">▶</span>
          <span id="btn-text-${q.id}">REVEAL SOLUTION</span>
        </button>

        <!-- Solution body -->
        <div class="solution-body" id="sol-${q.id}">
          <div class="mt-4 pt-4 border-t border-boss-border">
            <div class="flex items-center gap-2 mb-3">
              <span class="text-xs font-mono text-boss-accent uppercase tracking-widest">Step-by-step breakdown</span>
              <div class="flex-1 h-px bg-boss-border"></div>
            </div>
            ${q.steps.map((s, i) => `
              <div class="step-row py-2.5">
                <div class="text-xs text-boss-dim font-mono mb-1 uppercase tracking-wider">STEP ${i+1} · ${s.l}</div>
                ${s.mono
                  ? `<code class="block font-mono text-xs text-boss-cyan bg-[#0a0f1a] border border-[#1a2a3a] rounded-xl px-3 py-2 leading-6 whitespace-pre-wrap">${s.v}</code>`
                  : `<p class="text-sm text-boss-text leading-7 whitespace-pre-wrap">${s.v}</p>`
                }
              </div>
            `).join("")}

            <!-- Final answer -->
            <div class="mt-3 bg-boss-accent/10 border border-boss-accent/30 rounded-xl px-4 py-2.5">
              <span class="text-xs font-mono text-boss-accent uppercase tracking-wider">✓ FINAL ANSWER: </span>
              <span class="text-sm font-semibold text-boss-accent">${q.answer}</span>
            </div>
          </div>
        </div>

      </div>
    `).join("");
  }

  function toggleSolution(id, xp) {
    const sol = document.getElementById("sol-" + id);
    const btn = document.getElementById("btn-" + id);
    const icon = document.getElementById("btn-icon-" + id);
    const txt = document.getElementById("btn-text-" + id);
    const isOpen = sol.classList.contains("open");

    if (!isOpen) {
      sol.classList.add("open");
      btn.classList.add("border-boss-accent", "text-boss-accent");
      btn.classList.remove("border-boss-muted", "text-boss-dim");
      icon.textContent = "▼";
      txt.textContent = "HIDE SOLUTION";
      if (!xpMap[id]) {
        xpMap[id] = true;
        totalSolved++;
        totalXP += xp;
        updateStats();
      }
    } else {
      sol.classList.remove("open");
      btn.classList.remove("border-boss-accent", "text-boss-accent");
      btn.classList.add("border-boss-muted", "text-boss-dim");
      icon.textContent = "▶";
      txt.textContent = "REVEAL SOLUTION";
    }
  }

  function updateStats() {
    document.getElementById("solved").textContent = totalSolved;
    document.getElementById("score").textContent = totalXP;
    const pct = Math.round((totalSolved / 10) * 100);
    document.getElementById("pct").textContent = pct + "%";
    document.getElementById("progress").style.width = pct + "%";
  }

  function filterTopic(el, topic) {
    document.querySelectorAll(".tab-btn").forEach(b => {
      b.classList.remove("active-tab", "border-boss-accent", "text-boss-accent", "bg-boss-accent/10");
      b.classList.add("border-boss-border", "text-boss-dim", "bg-transparent");
    });
    el.classList.add("active-tab", "border-boss-accent", "text-boss-accent", "bg-boss-accent/10");
    el.classList.remove("border-boss-border", "text-boss-dim");
    renderCards(topic);
  }

  // Set initial active tab style
  document.querySelector('[data-t="all"]').classList.add("border-boss-accent", "text-boss-accent", "bg-boss-accent/10");
  document.querySelector('[data-t="all"]').classList.remove("border-boss-border", "text-boss-dim");

  renderCards("all");
  </script>
</body>
</html>
